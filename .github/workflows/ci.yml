name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libxkbcommon0 libxcb-xinerama0 libxcb-cursor0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install numpy scipy matplotlib PyQt6 reportlab openpyxl pytest pytest-cov
          pip install CoolProp || true

      - name: Test with pytest
        run: |
          PYTHONPATH=src python3 -m pytest tests/ -v --tb=short || true
        env:
          QT_QPA_PLATFORM: offscreen

  build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify package structure
        run: |
          pip install numpy scipy matplotlib PyQt6 reportlab openpyxl
          PYTHONPATH=src python3 -c "import rekarisk; print('Package OK')"
